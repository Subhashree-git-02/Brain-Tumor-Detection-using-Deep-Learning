<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRI Brain Tumor Detection</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* Floating animation background */
body::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: rgba(0, 255, 255, 0.1);
    border-radius: 50%;
    top: -100px;
    left: -100px;
    animation: float 8s infinite ease-in-out;
}

body::after {
    content: "";
    position: absolute;
    width: 500px;
    height: 500px;
    background: rgba(0, 150, 255, 0.1);
    border-radius: 50%;
    bottom: -100px;
    right: -100px;
    animation: float 8s infinite ease-in-out;
}

@keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(30px); }
}

.container {
    width: 100%;
    max-width: 700px;
    z-index: 1;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 40px;
    text-align: center;
    color: white;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    transition: 0.3s;
    min-height: 450px;
}

.card:hover {
    transform: scale(1.03);
}

h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 10px;
}

p {
    font-size: 15px;
    margin-bottom: 20px;
    color: #ccc;
}

input[type="file"] {
    width: 100%;
    padding: 10px;
    margin: 15px 0;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;

    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    box-shadow: 0 0 15px #00c6ff;
    transform: translateY(-2px);
}

.result-box {
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.result-box h3 {
    color: #00ffcc;
}

img {
    margin-top: 10px;
    max-width: 100%;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="container">
    <div class="card">
        <h1>MRI Brain Tumor Detection</h1>
        <p>Powered by Deep Learning on MRI Scans</p>

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <button class="btn">Upload & Detect</button>
        </form>

        {% if result %}
        <div class="result-box">
            <h3>{{ result }}</h3>
            <p>Confidence: {{ confidence }}</p>
            <img src="{{ file_path }}">
        </div>
        {% endif %}
    </div>
</div>

</body>
</html>
